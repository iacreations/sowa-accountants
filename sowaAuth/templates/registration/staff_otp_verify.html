{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Staff OTP</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: "Poppins", sans-serif;
    }
    .container {
      width: 400px;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .logo { display:flex; justify-content:center; margin-bottom:20px; }
    .logo img { width:100px; }
    .title { text-align:center; color:#39B54B; font-weight:700; margin-bottom:12px; }
    .hint { text-align:center; font-size:12px; color:#666; margin-bottom:18px; }
    .input-group {
      display:flex; align-items:center; gap:10px;
      background:#e8f5e9; border:1px solid #ccc; border-radius:30px;
      padding:10px 15px; margin-bottom:15px;
    }
    .input-group input {
      border:none; background:transparent; outline:none; flex:1;
    }
    .btn {
      width:180px; background:#39B54B; color:#fff; padding:10px;
      border:none; border-radius:30px; font-weight:bold; cursor:pointer;
      text-align:center; font-size:14px; margin:0 auto; display:block;
    }
    .btn:hover { background:#2da73e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="{% static 'sowaf/images/yo-logo.png' %}" alt="YoAccountant">
    </div>

    <div class="title">Verify Staff Login OTP</div>
    <div class="hint">We sent a 6-digit OTP to <strong>{{ email }}</strong></div>

    <form method="POST">
      {% csrf_token %}
      <div class="input-group">
        <i class='bx bx-lock-alt'></i>
        <input type="text" name="otp" placeholder="Enter OTP" required>
      </div>

      <button type="submit" class="btn">VERIFY OTP</button>
    </form>
  </div>
</body>
</html>
