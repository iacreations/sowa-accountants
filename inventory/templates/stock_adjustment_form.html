{% load static %}
{% include 'includes/navbar.html' %}
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Poppins", sans-serif; font-size: 14px; }
body { background: #f4f6f8; padding: 30px; }
.container { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); width: 80%; margin-top: 5%; margin-left: 20%; padding: 5%; }
h2.title { text-align: center; color: #39B54B; margin-bottom: 20px; font-size: 28px; font-weight: 700; }
.form-group { margin-bottom: 16px; }
label { display: block; margin-bottom: 6px; font-weight: 600; }
input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; text-decoration: none; }
.btn-green { background: #39B54B; color: #fff; }
.btn-green:hover { background: #2da73e; }
.btn-light { background: #f5f5f5; color: #333; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ddd; padding: 8px; }
th { background: #fafafa; }
.actions { display: flex; gap: 10px; margin-top: 20px; }
.add-line-btn { margin-top: 10px; background: #e8f5e9; color: #2a8b3f; border: 1px solid #c8e6c9; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
</style>
{% include 'includes/sidebar.html' %}
<div class="container">
  <h2 class="title">New Stock Adjustment</h2>
  {% for message in messages %}
  <div style="padding:10px; margin-bottom:10px; background:{% if message.tags == 'error' %}#fee2e2{% else %}#d2f4dc{% endif %}; border-radius:6px;">{{ message }}</div>
  {% endfor %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Date</label>
      <input type="date" name="date" value="{% now 'Y-m-d' %}">
    </div>
    <div class="form-group">
      <label>Reason</label>
      <select name="reason">
        {% for code, label in reason_choices %}
        <option value="{{ code }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Memo</label>
      <textarea name="memo" rows="3" placeholder="Optional notes..."></textarea>
    </div>
    <h3 style="margin-bottom:10px;">Lines</h3>
    <table id="lines-table">
      <thead>
        <tr><th>Product</th><th>Qty Increase</th><th>Qty Decrease</th><th>Unit Cost</th><th></th></tr>
      </thead>
      <tbody id="lines-body">
        <tr>
          <td>
            <select name="product_id[]">
              <option value="">-- Select Product --</option>
              {% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
            </select>
          </td>
          <td><input type="number" name="qty_increase[]" step="0.01" min="0" value="0"></td>
          <td><input type="number" name="qty_decrease[]" step="0.01" min="0" value="0"></td>
          <td><input type="number" name="unit_cost[]" step="0.01" min="0" value="0"></td>
          <td><button type="button" onclick="this.closest('tr').remove()">✕</button></td>
        </tr>
      </tbody>
    </table>
    <button type="button" class="add-line-btn" onclick="addLine()">+ Add Line</button>
    <div class="actions">
      <button type="submit" class="btn btn-green">Save Draft</button>
      <a href="{% url 'inventory:stock-adjustment-list' %}" class="btn btn-light">Cancel</a>
    </div>
  </form>
</div>
<script>
function addLine() {
  const tbody = document.getElementById('lines-body');
  const template = tbody.querySelector('tr').cloneNode(true);
  template.querySelectorAll('input').forEach(i => i.value = '0');
  template.querySelector('select').selectedIndex = 0;
  tbody.appendChild(template);
}
</script>
