<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"><title>Client Login</title>
<link rel="icon" type="image/x-icon" href="{% static 'sowaf/images/favicon.ico' %}">
</head>
<body>
  <h2>Client Login (OTP)</h2>

  {% if messages %}
    {% for m in messages %}<p>{{ m }}</p>{% endfor %}
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <label>Email</label><br/>
    <input type="email" name="email" value="{{ email }}" required>
    <br/><br/>
    <button type="submit">Send OTP</button>
  </form>
</body>
</html>
